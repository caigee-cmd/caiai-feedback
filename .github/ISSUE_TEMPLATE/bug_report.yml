name: 🐛 Bug 报告
description: 报告一个功能异常或错误
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！请尽量提供完整信息，方便我们快速定位和复现问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要描述你遇到的问题
      placeholder: 例如：点击登录按钮后页面无响应
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请按顺序列出能稳定复现问题的步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 输入 ...
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      description: 你期望看到什么结果？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请补充浏览器、操作系统、设备等信息
      placeholder: |
        浏览器：Chrome 126 / macOS 14.5
        设备：MacBook Pro M3
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: 如果有截图或录屏，请贴在这里（不要包含敏感信息）
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已经搜索过现有 Issue，确认没有重复报告
          required: true
        - label: 我没有在 Issue 中提交任何敏感信息
          required: true
