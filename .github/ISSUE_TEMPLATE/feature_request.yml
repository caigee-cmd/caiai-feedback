name: ✨ 功能建议
description: 提出一个新功能或改进建议
labels: [feature, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请告诉我们你希望 CaiAI 新增或改进什么。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 描述你当前遇到的痛点或使用场景
      placeholder: 例如：我经常需要批量导出数据，每次只能一个一个下载很麻烦
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案是什么？
      description: 描述你希望产品如何解决这个问题
      placeholder: 例如：希望增加一个"批量导出"按钮，可以勾选多项后一键下载
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过哪些替代方案？
      description: 有没有临时方案或其他实现方式？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 其他有助于理解这个需求的背景信息
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已经搜索过现有 Issue，确认没有重复建议
          required: true
        - label: 我没有在 Issue 中提交任何敏感信息
          required: true
