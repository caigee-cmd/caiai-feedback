name: ❓ 使用问题
description: 询问 CaiAI 的使用方式
labels: [question, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        如果你在使用过程中有疑问，可以在这里提问。我们会定期查看并回复。

  - type: textarea
    id: question
    attributes:
      label: 你的问题是什么？
      description: 请清晰描述你的疑问
      placeholder: 例如：如何批量删除已创建的任务？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 相关背景
      description: 你尝试过什么？遇到了什么阻碍？
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已经搜索过现有 Issue 和文档
          required: true
        - label: 我没有在 Issue 中提交任何敏感信息
          required: true
